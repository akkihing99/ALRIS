# Example configuration for ALRIS release training (RefCOCO + DETRIS backbone).
#
# `target_pcts[0]` is the size of the round-0 random cold-start subset.
# All paths are interpreted relative to the working directory at launch time.

DATA:
  dataset: refcoco
  train_lmdb:                 datasets/lmdb/refcoco/train.lmdb           # GT-text LMDB (used for corrected pool)
  train_lmdb_gsam_llava:      datasets/lmdb_gsam_llava/refcoco/train.lmdb  # pseudo-label LMDB
  train_split:                train
  train_split_gsam:           train_gsam
  val_lmdb:                   datasets/lmdb/refcoco/val.lmdb
  val_split:                  val

  gsam_mask_root:             datasets/gsam_mask/refcoco2
  train_mask_root_cor:        datasets/correction/refcoco
  mask_root_gt:               datasets/masks/refcoco

TEST:
  test_lmdb_val:              datasets/lmdb/refcoco/val.lmdb
  test_lmdb_testA:            datasets/lmdb/refcoco/testA.lmdb
  test_lmdb_testB:            datasets/lmdb/refcoco/testB.lmdb
  visualize: False

TRAIN:
  # DETRIS adapter / backbone
  visual_adapter_dim: 128
  visual_adapter_layer: [1, 3, 5, 7, 9, 11]
  txt_adapter_dim: 64
  txtual_adapter_layer: [1, 3, 5, 7, 9, 11]
  clip_pretrain:   pretrain/ViT-B-16.pt
  dino_pretrain:   pretrain/dinov2_vitb14_reg4_pretrain.pth
  dino_layers: 12
  output_dinov2: [4, 8]
  dino_name: dino-base
  model_name: CLIP-b-16

  # geometry & feature dims
  input_size: 448
  word_len: 17
  word_dim: 512
  ladder_dim: 128
  nhead: 8
  multi_stage: 3
  stride: [1, 1, 1]
  vis_dim: 512
  fpn_in: [768, 768, 768]
  fpn_out: [256, 512, 1024]
  sync_bn: True

  # decoder head
  num_layers: 3
  num_head: 8
  dim_ffn: 512
  dropout: 0.1
  intermediate: False

  # training loop
  workers: 32
  workers_val: 16
  epochs: 50
  milestones: [35, 55]
  start_epoch: 0
  batch_size: 32
  batch_size_val: 64
  base_lr: 0.0001
  lr_decay: 0.1
  lr_multi: 1
  weight_decay: 0.
  max_norm: 0.
  manual_seed: 0
  print_freq: 100
  evaluate: True

  # run identity
  exp_name: ALRIS_release_demo
  output_folder: exp/refcoco/alris

Distributed:
  dist_url: tcp://localhost:3681
  dist_backend: nccl
  multiprocessing_distributed: True
  world_size: 1
  rank: 0

AL:
  # cumulative target cost as a fraction of full-dataset annotation budget;
  # round 0 uses target_pcts[0] (= 1% in this example) with random sampling.
  target_pcts: [0.01, 0.02, 0.05, 0.1, 0.2]
  epochs_list: [20, 25, 30, 35, 40]

  label_mode: region_entropy        # 'random' or 'region_entropy'
  cost_key:   real_ours_total       # fixed-cost mode; see al/active_learning.py
  use_first_only: False
  reject_cost: 1.0

  # leave empty to use fixed-cost mode (cost_key in FIXED_TOTAL_COSTS);
  # set both to use per-sample JSONs:
  #   mask_cost_json: datasets/al_cost/mask3/refcoco/sam_correction_stats.json
  #   text_cost_json: datasets/al_cost/text3/refcoco/text_cost_5.json
  mask_cost_json:
  text_cost_json:
